<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>81|00 Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07111f;--navy:#0a1628;--navy2:#101e30;--card:#0f1e30;
  --teal:#00b4a6;--gold:#e8b84b;--red:#e85454;--green:#4be87a;
  --text:#e8edf3;--text2:#8899aa;--brd:#1e2e40;--td2:#131f2e;
  --r2:10px;--r3:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

.batch-fab{position:fixed;bottom:calc(max(env(safe-area-inset-bottom),4px)+60px);right:14px;background:var(--gold);color:#000;font-size:13px;font-weight:800;padding:12px 18px;border-radius:30px;border:none;cursor:pointer;z-index:50;box-shadow:0 4px 20px rgba(232,184,75,.5);display:none;animation:pulse .8s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.05)}}
.batch-cell{outline:2px dashed var(--gold);outline-offset:-2px;cursor:pointer;transition:background .15s}
.batch-cell:hover{background:rgba(232,184,75,.08)!important}
.bm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;display:flex;align-items:flex-end}
.bm-sheet{background:var(--navy2);border-radius:16px 16px 0 0;padding:20px 16px;padding-bottom:max(env(safe-area-inset-bottom)+16px,20px);width:100%;max-width:480px;margin:0 auto}
.bm-title{font-size:15px;font-weight:800;margin-bottom:14px}
.bm-field{margin-bottom:12px}
.bm-field label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:block;margin-bottom:4px}
.bm-field input,.bm-field select{width:100%;background:var(--navy);border:1px solid var(--brd);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:10px 12px;outline:none}
.wa-card{background:var(--navy2);border:1px solid var(--brd);border-radius:12px;padding:16px;margin-top:14px;font-family:'DM Mono',monospace;font-size:12px;white-space:pre-wrap;color:var(--text);line-height:1.7}

#splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:999;transition:opacity .3s}
#splash h1{font-size:32px;font-weight:800;color:var(--teal);margin:12px 0 6px}
#splash p{font-size:13px;color:var(--text2)}

/* ── LOGIN ── */
#login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px}
#login-screen h2{font-size:20px;font-weight:800;margin-bottom:6px}
#login-screen p{font-size:13px;color:var(--text2);text-align:center;margin-bottom:32px}
.pin-display{display:flex;gap:12px;margin-bottom:32px}
.pin-dot{width:18px;height:18px;border-radius:50%;background:var(--brd);transition:background .15s}
.pin-dot.filled{background:var(--teal)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:252px}
.pin-btn{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:20px;font-size:24px;font-weight:700;color:var(--text);cursor:pointer;font-family:'DM Mono',monospace;transition:background .1s}
.pin-btn:active{background:var(--teal);color:#fff;transform:scale(.95)}
.pin-del{background:var(--navy);font-size:20px}
#login-err{color:var(--red);font-size:13px;margin-top:16px;min-height:18px;text-align:center}

/* ── MAIN APP ── */
#app{display:none;flex-direction:column;height:100%;overflow:hidden}
#topbar{background:var(--navy);padding:env(safe-area-inset-top,12px) 16px 10px;padding-top:max(env(safe-area-inset-top),12px);flex-shrink:0;border-bottom:1px solid var(--brd)}
#topbar-inner{display:flex;align-items:center;justify-content:space-between}
#tb-title{font-size:17px;font-weight:800}
#tb-badge{background:var(--gold);color:#000;font-size:12px;font-weight:800;border-radius:10px;padding:2px 8px;display:none}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 100px}

/* ── BOTTOM NAV ── */
#nav{background:var(--navy);border-top:1px solid var(--brd);display:flex;padding:4px 0;padding-bottom:max(env(safe-area-inset-bottom),4px);flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.3px;position:relative;transition:color .15s}
.ni.active{color:var(--teal)}
.ni-icon{font-size:22px;margin-bottom:3px}
.ni-badge{position:absolute;top:4px;right:calc(50% - 22px);background:var(--gold);color:#000;font-size:12px;font-weight:800;border-radius:8px;padding:2px 6px;display:none}

/* ── UI COMPONENTS ── */
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r3);padding:14px;margin-bottom:12px}
.sect{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin:18px 0 10px}
.chip{display:inline-flex;align-items:center;background:var(--td2);border:1px solid var(--brd);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:600;margin:3px 3px 3px 0}
.btn{border:none;border-radius:10px;padding:13px 20px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-p{background:var(--teal);color:#fff}
.btn-s{background:transparent;border:1.5px solid var(--brd);color:var(--text)}
.btn-d{background:rgba(232,84,84,.12);border:1.5px solid var(--red);color:var(--red)}
.badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap}
.b-teal{background:rgba(0,180,166,.15);color:var(--teal);border:1px solid var(--teal)}
.b-gold{background:rgba(232,184,75,.15);color:var(--gold);border:1px solid var(--gold)}
.b-red{background:rgba(232,84,84,.15);color:var(--red);border:1px solid var(--red)}
.b-green{background:rgba(75,232,122,.15);color:var(--green);border:1px solid var(--green)}
.b-gray{background:var(--td2);color:var(--text2);border:1px solid var(--brd)}
label{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:5px}
input,select,textarea{background:var(--navy);border:1px solid var(--brd);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;padding:10px 12px;width:100%;outline:none;margin-bottom:12px}
select option{background:var(--navy)}
textarea{resize:vertical;min-height:90px;font-size:13px}
.field{margin-bottom:2px}
.hr{border:none;border-top:1px solid var(--brd);margin:12px 0}
.oggi-block{border-radius:var(--r2);padding:14px;margin-bottom:10px;border-left:4px solid}
.pr-card{padding:12px 14px;margin-bottom:10px;background:var(--card);border-radius:0 var(--r2) var(--r2) 0;border:1px solid var(--brd);border-left:3px solid var(--teal)}
.pr-card.pending{border-left-color:var(--gold)}
.pr-card.approved{border-left-color:var(--green)}
.pr-card.rejected{border-left-color:var(--red)}
.empty{text-align:center;padding:48px 16px;color:var(--text2);font-size:14px}
#toast-r{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy2);border:1px solid var(--brd);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:1000;opacity:0;transition:opacity .25s;white-space:nowrap;max-width:90vw;text-align:center;pointer-events:none}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:52px">🏗️</div>
  <h1>81|00 Field</h1>
  <p>Caricamento...</p>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div style="font-size:44px;margin-bottom:10px">🔑</div>
  <h2>Accesso</h2>
  <p>Inserisci il PIN ricevuto<br>dal responsabile.</p>
  <div class="pin-display">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div><div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinDigit('1')">1</button>
    <button class="pin-btn" onclick="pinDigit('2')">2</button>
    <button class="pin-btn" onclick="pinDigit('3')">3</button>
    <button class="pin-btn" onclick="pinDigit('4')">4</button>
    <button class="pin-btn" onclick="pinDigit('5')">5</button>
    <button class="pin-btn" onclick="pinDigit('6')">6</button>
    <button class="pin-btn" onclick="pinDigit('7')">7</button>
    <button class="pin-btn" onclick="pinDigit('8')">8</button>
    <button class="pin-btn" onclick="pinDigit('9')">9</button>

  </div>
  <div id="login-err"></div>
</div>

<!-- APP -->
<!-- FAB batch proposte -->
<button class="batch-fab" id="batch-fab" onclick="mostraRiepilogoModifiche()">
  ✏️ Proponi modifiche <span id="batch-count">0</span>
</button>

<!-- Bottom sheet modifica cella griglia -->
<div class="bm-overlay" id="bm-overlay" style="display:none" onclick="if(event.target===this)chiudiBm()">
  <div class="bm-sheet">
    <div class="bm-title" id="bm-title">Modifica turno</div>
    <input type="hidden" id="bm-data">
    <input type="hidden" id="bm-nome">
    <input type="hidden" id="bm-cid">
    <input type="hidden" id="bm-ivid">
    <!-- Stato attuale (prima) -->
    <div id="bm-before" style="background:rgba(232,84,84,.08);border:1px solid rgba(232,84,84,.2);border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:var(--text2)"></div>
    <div class="bm-field"><label>Cantiere</label>
      <select id="bm-cantiere"></select>
    </div>
    <div style="display:flex;gap:10px">
      <div class="bm-field" style="flex:1"><label>Ora inizio</label>
        <input type="time" id="bm-oraI" value="08:00"></div>
      <div class="bm-field" style="flex:1"><label>Ora fine</label>
        <input type="time" id="bm-oraF" value="18:00"></div>
    </div>
    <div class="bm-field"><label>Note (opzionale)</label>
      <input type="text" id="bm-note" placeholder="es. orario modificato per..."></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button onclick="chiudiBm()" style="flex:1;background:var(--navy);border:1px solid var(--brd);border-radius:8px;padding:12px;color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer">Annulla</button>
      <button id="bm-rimuovi" onclick="salvaModificaCella('rimuovi')" style="background:rgba(232,84,84,.15);border:1px solid var(--red);border-radius:8px;padding:12px 14px;color:var(--red);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:none">✕ Rimuovi</button>
      <button onclick="salvaModificaCella('modifica')" style="flex:2;background:var(--gold);border:none;border-radius:8px;padding:12px;color:#000;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;cursor:pointer">✓ Applica modifica</button>
    </div>
  </div>
</div>

<!-- Riepilogo modifiche da proporre -->
<div class="bm-overlay" id="batch-recap-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="bm-sheet" style="max-height:75vh;overflow-y:auto">
    <div class="bm-title">📋 Modifiche da proporre a Giuseppe</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Giuseppe vedrà tutte le modifiche e approverà o rifiuterà l'insieme</div>
    <div id="batch-recap-list"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="document.getElementById('batch-recap-overlay').style.display='none'" style="flex:1;background:var(--navy);border:1px solid var(--brd);border-radius:8px;padding:12px;color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer">Continua a modificare</button>
      <button onclick="inviaBatch()" style="flex:2;background:var(--teal);border:none;border-radius:8px;padding:12px;color:#000;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;cursor:pointer">📤 Proponi a Giuseppe</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div id="topbar-inner">
      <div>
        <div style="font-size:12px;color:var(--text2);letter-spacing:1px">81|00 FIELD</div>
        <div id="tb-title">Oggi</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="tb-badge"></span>
        <span id="tb-user" style="font-size:12px;color:var(--text2)">Roberto</span>
        <button onclick="logout()" style="background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer">Esci</button>
      </div>
    </div>
  </div>
  <div id="content"></div>
  <div id="nav">
    <div class="ni active" id="ni-oggi" onclick="navigate('oggi')">
      <div class="ni-icon">📅</div>Oggi
    </div>
    <div class="ni" id="ni-cantieri" onclick="navigate('cantieri')">
      <div class="ni-icon">🏗️</div>Cantieri
    </div>
    <div class="ni" id="ni-squadre" onclick="navigate('squadre')">
      <div class="ni-icon">👥</div>Squadre
    </div>
    <div class="ni" id="ni-proponi" onclick="navigate('proponi')">
      <div class="ni-icon">✏️</div>Proponi
    </div>
    <div class="ni" id="ni-proposte" onclick="navigate('proposte')">
      <div class="ni-icon">📋</div>Proposte
      <span class="ni-badge" id="ni-badge">0</span>
    </div>
  </div>
</div>

<div id="toast-r"></div>

<script>
'use strict';
// ── CONFIG ─────────────────────────────────────────────────────
const SB_URL  = 'https://xqbhujcnjvwbwzpwjujf.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxYmh1amNuanZ3Ynd6cHdqdWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzM4ODUsImV4cCI6MjA5NzMwOTg4NX0.VstO3aII143jpPXjgKg0t3du-yc5rS9xs2hYko_2DRs';
const SB_TBL  = 'gestionale_dati';
const MAIN_ID = 'unico';
const STG_ID  = 'roberto_staging';
const USERNAME= 'Roberto';

// ── STATO ──────────────────────────────────────────────────────
let DB      = {};   // dati operativi da 'unico' — zero dati economici
let STAGING = { changeRequests:[], config:{} };
let PAGE    = 'oggi';
let pinBuf  = '';

// ── UTILITY ────────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0,10);
const uid   = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fdate = s => { if(!s)return'—'; const[y,m,d]=s.split('-'); return`${d}/${m}/${y}`; };
const GG    = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const fgiorno   = s => { if(!s)return''; return GG[new Date(s+'T12:00:00').getDay()]; };
const fdateG    = s => `${fgiorno(s)} ${fdate(s)}`;
const toMin     = t => { if(!t)return 0; const[h,m]=(t||'00:00').split(':'); return parseInt(h)*60+parseInt(m||0); };
const sqArr     = iv => { if(!iv?.squadra)return[]; return Array.isArray(iv.squadra)?iv.squadra:iv.squadra.split(',').map(s=>s.trim()).filter(Boolean); };
const PAL = ['#00b4a6','#3b82f6','#f59e0b','#10b981','#8b5cf6','#ef4444','#f97316','#06b6d4'];
const COL = {}; let CI=0;
const clr = id => { if(!COL[id])COL[id]=PAL[CI++%PAL.length]; return COL[id]; };

function toast(msg, dur=2800){
  const t=document.getElementById('toast-r');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.style.opacity='0',dur);
}

// ── SUPABASE ───────────────────────────────────────────────────
const HDR = {'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'};

async function sbRead(id){
  const r = await fetch(`${SB_URL}/rest/v1/${SB_TBL}?id=eq.${id}&select=dati`,{
    headers:HDR,
    cache:'no-cache'  // forza dati freschi — evita cache browser/PWA
  });
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const rows = await r.json();
  return rows?.[0]?.dati ?? null;
}

// Upsert corretto per Supabase: POST con resolution=merge-duplicates
// evita il problema del PATCH che ritorna 204 anche su 0 righe aggiornate.
async function sbUpsert(id, dati){
  const r = await fetch(`${SB_URL}/rest/v1/${SB_TBL}`, {
    method:'POST',
    headers:{...HDR,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body: JSON.stringify({id, dati, aggiornato_il:new Date().toISOString()})
  });
  if(!r.ok) throw new Error(`Upsert ${id} fallito: ${r.status}`);
}

async function saveStaging(){
  await sbUpsert(STG_ID, STAGING);
}

// ── SHA-256 PIN HASH (Web Crypto — no dipendenze) ──────────────
async function sha256(s){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── CARICAMENTO DATI ───────────────────────────────────────────
// Campi economici che Roberto non deve mai vedere.
// Vengono rimossi a livello di codice prima di assegnare a DB,
// non semplicemente nascosti dalla UI — defense in depth.
const VIETATI = ['ricavo','costo','margine','tariffe','tariffa','preventivo'];

function filtraEco(c){
  const o={...c};
  // Rimuove i campi economici di primo livello
  VIETATI.forEach(k=>delete o[k]);
  // Rimuove il prezzo dai servizi esterni — Roberto non deve vedere
  // quanto paghiamo i fornitori (informazione contrattuale riservata)
  if(Array.isArray(o.serviziEsterni)){
    o.serviziEsterni = o.serviziEsterni.map(s=>({
      fornitore: s.fornitore||'',
      descrizione: s.descrizione||'',
      note: s.note||''
    }));
  }
  return o;
}

async function loadMain(){
  const d = await sbRead(MAIN_ID);
  if(!d) return;
  const archIds = new Set(d._cantieriArchiviati||[]);
  DB.cantieri = (d.cantieri||[]).filter(c=>{
    // Escludi archiviati
    if(archIds.has(c.id)) return false;
    // Escludi conclusi e persi — Roberto vede solo cantieri attivi/da confermare
    const s=(c.stato||'').toLowerCase();
    if(s.includes('conclus')||s.includes('perso')||s.includes('rifiut')) return false;
    return true;
  }).map(filtraEco);
  DB.personaleHR = (d.personaleHR||[]);
  DB.mezziDB     = (d.mezziDB||[]);
}

async function loadStaging(){
  const d = await sbRead(STG_ID);
  if(d){
    STAGING = d;
    if(!STAGING.changeRequests) STAGING.changeRequests=[];
    if(!STAGING.config)         STAGING.config={};
  } else {
    STAGING = {changeRequests:[], config:{}};
    await saveStaging(); // inizializza la riga se non esiste
  }
}

// ── PIN ────────────────────────────────────────────────────────
function pinDigit(d){
  if(pinBuf.length>=6) return;
  pinBuf+=d; _updateDots();
  if(pinBuf.length===6) setTimeout(verifyPin,150);
}
function pinDel()  { pinBuf=pinBuf.slice(0,-1); _updateDots(); }
function pinClear(){ pinBuf=''; _updateDots(); }
function _updateDots(){
  for(let i=0;i<6;i++) document.getElementById('pd'+i)?.classList.toggle('filled',i<pinBuf.length);
}

async function verifyPin(){
  const errEl = document.getElementById('login-err');
  errEl.textContent='⏳ Verifica...';
  try{
    await loadStaging();
    const stored = STAGING.config?.pinHash;
    if(!stored){
      errEl.textContent='PIN non ancora configurato — contatta il responsabile.';
      pinBuf=''; _updateDots(); return;
    }
    const h = await sha256(pinBuf);
    if(h===stored){
      localStorage.setItem('r_auth', h);
      await bootApp();
    } else {
      errEl.textContent='PIN errato. Riprova.';
      pinBuf=''; _updateDots();
      // vibrazione tattile di errore (solo dove supportato)
      if(navigator.vibrate) navigator.vibrate([80,30,80]);
    }
  }catch(e){
    errEl.textContent='Errore di rete. Controlla la connessione.';
    pinBuf=''; _updateDots();
  }
}

// ── BOOT ───────────────────────────────────────────────────────
async function boot(){
  const splash = document.getElementById('splash');
  try{
    const saved = localStorage.getItem('r_auth');
    if(saved){
      await loadStaging();
      if(STAGING.config?.pinHash && saved===STAGING.config.pinHash){
        await loadMain();
        await bootApp();
        splash.style.opacity='0';
        setTimeout(()=>splash.style.display='none',300);
        return;
      }
    }
  }catch(e){ /* rete non disponibile — mostra login offline */ }
  splash.style.opacity='0';
  setTimeout(()=>{
    splash.style.display='none';
    const ls = document.getElementById('login-screen');
    ls.style.display='flex';
  },300);
}

async function bootApp(){
  document.getElementById('splash').style.opacity='0';
  setTimeout(()=>document.getElementById('splash').style.display='none',300);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  aggBadge();
  navigate('oggi');
}

function logout(){
  if(!confirm('Esci dall\'app?')) return;
  localStorage.removeItem('r_auth');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  pinBuf=''; _updateDots();
  document.getElementById('login-err').textContent='';
}

// ── SQUADRE ────────────────────────────────────────────────────
// Tre viste: per giorno (default mobile), per persona, griglia.
// Sola lettura — per modificare si usa il workflow Proponi.
// Toccare "Libero" pre-compila il form Proponi per quella
// persona/giorno, evitando di reinserire i dati a mano.

let SQ = { vista:'giorno', giornoIdx:0, personaIdx:0 };

function timeOverlap(s1,e1,s2,e2){
  const n=(i,f)=>toMin(f)>toMin(i)?[toMin(i),toMin(f)]:[toMin(i),toMin(f)+1440];
  const[a1,b1]=n(s1,e1),[a2,b2]=n(s2,e2);
  return a1<b2&&a2<b1;
}

function giornoDopo(d){
  const x=new Date(d+'T12:00:00'); x.setDate(x.getDate()+1); return x.toISOString().slice(0,10);
}

function buildSqMappa(giorni){
  const set=new Set(giorni), mappa={};
  giorni.forEach(g=>mappa[g]={});
  (DB.cantieri||[]).forEach(c=>{
    (c.interventi||[]).forEach(iv=>{
      const aggiungi=data=>{
        if(!mappa[data]) return;
        sqArr(iv).forEach(nome=>{
          const k=nome.toLowerCase();
          if(!mappa[data][k]) mappa[data][k]=[];
          if(!mappa[data][k].some(x=>x.ivId===iv.id&&x.cId===c.id))
            mappa[data][k].push({nome,cNome:c.nome,cId:c.id,ivId:iv.id,oraI:iv.oraInizio||'08:00',oraF:iv.oraFine||'18:00',notturno:!!iv.notturno});
        });
      };
      aggiungi(iv.data);
      if(iv.notturno||(iv.oraFine&&iv.oraInizio&&toMin(iv.oraFine)<=toMin(iv.oraInizio))){
        const dataSucc=giornoDopo(iv.data);
        if(mappa[dataSucc]){
          sqArr(iv).forEach(nome=>{
            const k=nome.toLowerCase();
            if(!mappa[dataSucc][k]) mappa[dataSucc][k]=[];
            if(!mappa[dataSucc][k].some(x=>x.ivId===iv.id&&x.cId===c.id))
              mappa[dataSucc][k].push({nome,cNome:c.nome,cId:c.id,ivId:iv.id,oraI:'00:00',oraF:iv.oraFine||'02:00',notturno:true});
          });
        }
      }
    });
  });
  return mappa;
}

function getDatiSq(){
  const da=document.getElementById('sq-r-from')?.value;
  const al=document.getElementById('sq-r-to')?.value;
  if(!da||!al) return null;
  const giorni=[]; let cur=new Date(da+'T12:00:00'),fine=new Date(al+'T12:00:00'),g=0;
  while(cur<=fine&&g<31){giorni.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);g++;}
  const mappa=buildSqMappa(giorni);
  const persone=(DB.personaleHR||[]).map(p=>`${p.nome||''} ${p.cognome||''}`.trim()).filter(Boolean);
  const extra=new Set();
  giorni.forEach(gg=>Object.values(mappa[gg]).forEach(as=>as.forEach(v=>{
    if(!persone.some(p=>p.toLowerCase()===v.nome.toLowerCase())) extra.add(v.nome);
  })));
  return {da,al,giorni,mappa,righe:[...persone,...extra]};
}

function setSqVista(v){
  SQ.vista=v;
  ['giorno','persona','griglia'].forEach(k=>{
    const b=document.getElementById('sqb-'+k);
    if(b){b.style.background=k===v?'var(--teal)':'transparent';b.style.color=k===v?'#fff':'var(--text2)';}
  });
  if(v==='giorno') SQ.giornoIdx=0;
  if(v==='persona') SQ.personaIdx=0;
  aggiornaVistaSq();
}

function aggiornaVistaSq(){
  const wrap=document.getElementById('sq-r-wrap'); if(!wrap) return;
  const d=getDatiSq();
  if(!d){wrap.innerHTML='<div class="empty">Seleziona un periodo.</div>';return;}
  if(SQ.vista==='giorno')  _sqGiorno(wrap,d);
  else if(SQ.vista==='persona') _sqPersona(wrap,d);
  else _sqGriglia(wrap,d);
}

function renderSquadre(el){
  el.innerHTML=`
    <!-- Toggle vista -->
    <div style="display:flex;gap:4px;background:var(--navy2);border-radius:10px;padding:4px;margin-bottom:14px">
      <button id="sqb-giorno" onclick="setSqVista('giorno')" style="flex:1;padding:8px 4px;border-radius:7px;border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:var(--teal);color:#fff">📅 Per giorno</button>
      <button id="sqb-persona" onclick="setSqVista('persona')" style="flex:1;padding:8px 4px;border-radius:7px;border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2)">👷 Per persona</button>
      <button id="sqb-griglia" onclick="setSqVista('griglia')" style="flex:1;padding:8px 4px;border-radius:7px;border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2)">📊 Griglia</button>
    </div>
    <!-- Selettore periodo -->
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn btn-s" style="flex:1;margin-top:0;padding:8px;font-size:12px" onclick="setPeriodoSq('oggi')">Oggi</button>
      <button class="btn btn-s" style="flex:1;margin-top:0;padding:8px;font-size:12px" onclick="setPeriodoSq('settimana')">Settimana</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div style="flex:1"><label>Da</label><input type="date" id="sq-r-from" onchange="aggiornaVistaSq()" style="margin-bottom:0"></div>
      <div style="flex:1"><label>A</label><input type="date" id="sq-r-to" onchange="aggiornaVistaSq()" style="margin-bottom:0"></div>
    </div>
    <div id="sq-r-wrap"></div>
    <button id="batch-toggle" onclick="toggleBatchMode()" style="width:100%;background:rgba(232,184,75,.06);border:1.5px dashed rgba(232,184,75,.4);border-radius:10px;padding:11px;color:var(--gold);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px">
      ✏️ Modifica griglia — tocca per attivare
    </button>`;
  // default: questa settimana
  setPeriodoSq('settimana');
}

function setPeriodoSq(tipo){
  const oggi=new Date();
  let da,al;
  if(tipo==='oggi'){
    da=al=today();
  } else {
    const g=oggi.getDay()||7;
    const lun=new Date(oggi); lun.setDate(oggi.getDate()-g+1);
    const dom=new Date(lun); dom.setDate(lun.getDate()+6);
    da=lun.toISOString().slice(0,10);
    al=dom.toISOString().slice(0,10);
  }
  const ef=document.getElementById('sq-r-from'), et=document.getElementById('sq-r-to');
  if(ef) ef.value=da;
  if(et) et.value=al;
  aggiornaVistaSq();
}

// ── VISTA PER GIORNO ──────────────────────────────────────────
function _sqGiorno(el,{giorni,mappa,righe}){
  SQ.giornoIdx=Math.max(0,Math.min(SQ.giornoIdx,giorni.length-1));
  const g=giorni[SQ.giornoIdx];
  const prev=SQ.giornoIdx>0, next=SQ.giornoIdx<giorni.length-1;

  // raggruppa per cantiere in quel giorno
  const perC={};
  righe.forEach(nome=>{
    (mappa[g][nome.toLowerCase()]||[]).forEach(a=>{
      const k=a.cId+'|'+a.oraI+'|'+a.oraF;
      if(!perC[k]) perC[k]={cNome:a.cNome,cId:a.cId,ivId:a.ivId,oraI:a.oraI,oraF:a.oraF,persone:[]};
      if(!perC[k].persone.includes(nome)) perC[k].persone.push(nome);
    });
  });
  const assegnati=new Set(righe.filter(n=>mappa[g][n.toLowerCase()]?.length));
  const liberi=righe.filter(n=>!mappa[g][n.toLowerCase()]?.length);
  const cantieri=Object.values(perC);

  let h=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button onclick="SQ.giornoIdx--;aggiornaVistaSq()" ${prev?'':'disabled'} style="background:${prev?'var(--teal)':'var(--brd)'};border:none;border-radius:10px;width:44px;height:44px;font-size:20px;cursor:${prev?'pointer':'default'};color:#fff;flex-shrink:0">←</button>
      <div style="text-align:center;flex:1">
        <div style="font-size:22px;font-weight:800">${fgiorno(g)}</div>
        <div style="font-size:13px;color:var(--text2);font-family:'DM Mono',monospace">${fdate(g)}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${SQ.giornoIdx+1} / ${giorni.length}</div>
      </div>
      <button onclick="SQ.giornoIdx++;aggiornaVistaSq()" ${next?'':'disabled'} style="background:${next?'var(--teal)':'var(--brd)'};border:none;border-radius:10px;width:44px;height:44px;font-size:20px;cursor:${next?'pointer':'default'};color:#fff;flex-shrink:0">→</button>
    </div>`;

  if(!cantieri.length){
    h+=`<div class="card" style="text-align:center;padding:28px"><div style="font-size:32px;margin-bottom:8px">🌴</div><div style="color:var(--text2)">Nessun intervento pianificato</div></div>`;
  } else {
    h+=cantieri.map(r=>{
      const c=clr(r.cId);
      return `<div style="background:${c}10;border:1.5px solid ${c};border-radius:var(--r3);padding:14px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:16px;font-weight:800;color:${c}">${r.cNome}</div>
          <div style="font-size:12px;font-weight:700;background:${c}25;border:1px solid ${c};border-radius:6px;padding:3px 9px;color:${c}">${r.oraI}–${r.oraF}</div>
        </div>
        <div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);margin-bottom:7px">👷 Squadra assegnata</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${r.persone.map(p=>`<span class="chip" style="border-color:${c};color:var(--text)">${p}</span>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  if(liberi.length){
    h+=`<div style="background:var(--navy2);border-radius:var(--r2);padding:12px;margin-top:4px">
      <div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);margin-bottom:8px">🟢 Disponibili — non ancora assegnati</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${liberi.map(p=>`<span class="chip" onclick="precompilaProponiDaSquadre('${g}','${p.replace(/'/g,"\\'")}','${clr('libero')}')" style="cursor:pointer;border-style:dashed" title="Tocca per proporre un'assegnazione">${p} <span style="color:var(--teal);font-size:12px">+proponi</span></span>`).join('')}
      </div>
    </div>`;
  }
  el.innerHTML=h;
}

// ── VISTA PER PERSONA ─────────────────────────────────────────
function _sqPersona(el,{giorni,mappa,righe}){
  if(!righe.length){el.innerHTML='<div class="empty">Nessun dipendente in anagrafica.</div>';return;}
  SQ.personaIdx=Math.max(0,Math.min(SQ.personaIdx,righe.length-1));
  const nome=righe[SQ.personaIdx];
  const nomeLC=nome.toLowerCase();
  const prev=SQ.personaIdx>0, next=SQ.personaIdx<righe.length-1;
  const impegnati=giorni.filter(g=>(mappa[g][nomeLC]||[]).length>0);

  let h=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button onclick="SQ.personaIdx--;aggiornaVistaSq()" ${prev?'':'disabled'} style="background:${prev?'var(--teal)':'var(--brd)'};border:none;border-radius:10px;width:44px;height:44px;font-size:20px;cursor:${prev?'pointer':'default'};color:#fff;flex-shrink:0">←</button>
      <div style="text-align:center;flex:1">
        <div style="font-size:20px;font-weight:800">👷 ${nome}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">${SQ.personaIdx+1} / ${righe.length}</div>
      </div>
      <button onclick="SQ.personaIdx++;aggiornaVistaSq()" ${next?'':'disabled'} style="background:${next?'var(--teal)':'var(--brd)'};border:none;border-radius:10px;width:44px;height:44px;font-size:20px;cursor:${next?'pointer':'default'};color:#fff;flex-shrink:0">→</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div style="flex:1;background:var(--card);border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:24px;font-weight:800;color:var(--teal)">${impegnati.length}</div>
        <div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Impegnato</div>
      </div>
      <div style="flex:1;background:var(--card);border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:24px;font-weight:800;color:var(--text2)">${giorni.length-impegnati.length}</div>
        <div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Libero</div>
      </div>
    </div>`;

  if(!impegnati.length){
    h+=`<div class="card" style="text-align:center;padding:24px"><div style="font-size:28px;margin-bottom:8px">📅</div><div style="color:var(--text2)">Nessun impegno pianificato nel periodo</div></div>`;
  } else {
    h+=giorni.map(g=>{
      const ass=mappa[g][nomeLC]||[];
      const isOggi=g===today();
      return `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">
        <div style="min-width:48px;text-align:center;padding-top:2px;flex-shrink:0">
          <div style="font-size:12px;font-weight:700;color:${isOggi?'var(--teal)':'var(--text2)'}">${fgiorno(g)}</div>
          <div style="font-size:12px;color:var(--text2);font-family:'DM Mono',monospace">${fdate(g).slice(0,5)}</div>
        </div>
        <div style="flex:1">
          ${ass.length===0
            ? `<div onclick="precompilaProponiDaSquadre('${g}','${nome.replace(/'/g,"\\'")}','')" style="cursor:pointer;color:var(--text2);font-size:12px;padding:8px;background:var(--navy2);border-radius:8px;border:1px dashed var(--brd)">Libero — <span style="color:var(--teal)">+proponi assegnazione</span></div>`
            : ass.map(a=>{
                const c=clr(a.cId);
                return `<div style="background:${c}15;border:1.5px solid ${c};border-radius:9px;padding:9px 12px;margin-bottom:5px">
                  <div style="font-size:14px;font-weight:700;color:${c}">${a.cNome}</div>
                  <div style="font-size:12px;color:var(--text2);margin-top:2px">${a.oraI}–${a.oraF}${a.notturno?' 🌙':''}</div>
                </div>`;
              }).join('')
          }
        </div>
      </div>`;
    }).join('');
  }
  el.innerHTML=h;
}

// ── VISTA GRIGLIA ─────────────────────────────────────────────
function _sqGriglia(el,{giorni,mappa,righe}){
  if(!righe.length){el.innerHTML='<div class="empty">Nessun dipendente in anagrafica.</div>';return;}
  const bm=window._batchMode||false;
  const changes=window._gridChanges||{};
  const nChanges=Object.keys(changes).length;
  const haConfl=as=>{for(let i=0;i<as.length;i++)for(let j=i+1;j<as.length;j++)if(timeOverlap(as[i].oraI,as[i].oraF,as[j].oraI,as[j].oraF))return true;return false;};
  window._sqCells=[];
  let h=`<div style="overflow-x:auto">
    ${bm?`<div style="font-size:13px;font-weight:700;padding:10px 12px;background:rgba(232,184,75,.1);border:1px solid rgba(232,184,75,.3);border-radius:8px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
      <span style="color:var(--gold)">✏️ Modalità modifica attiva</span>
      ${nChanges>0?`<span style="background:var(--gold);color:#000;border-radius:20px;padding:2px 10px;font-size:12px">${nChanges} modifiche</span>`:'<span style="font-size:12px;color:var(--text2)">Tocca una cella</span>'}
    </div>`:''}
    <table style="border-collapse:collapse;font-size:12px;min-width:100%">
    <thead><tr>
      <th style="position:sticky;left:0;background:var(--card);padding:6px 10px;text-align:left;border-bottom:2px solid var(--brd);white-space:nowrap;z-index:1">Persona</th>
      ${giorni.map(g=>`<th style="padding:5px 6px;text-align:center;border-bottom:2px solid var(--brd);min-width:80px;white-space:nowrap">${fgiorno(g)}<br><span style="font-weight:400;color:var(--text2);font-size:12px">${fdate(g).slice(0,5)}</span></th>`).join('')}
    </tr></thead><tbody>`;
  righe.forEach((nome,ri)=>{
    const nLC=nome.toLowerCase();
    h+=`<tr><td style="position:sticky;left:0;background:${ri%2===0?'var(--card)':'var(--navy2)'};padding:6px 10px;font-weight:600;border-bottom:1px solid var(--brd);white-space:nowrap;font-size:12px">${nome}</td>`;
    giorni.forEach(g=>{
      const assOrig=mappa[g][nLC]||[];
      const changeKey=`${g}::${nome}`;
      const change=changes[changeKey];
      const bg=ri%2===0?'var(--card)':'var(--navy2)';
      const idx=window._sqCells.length;
      window._sqCells.push({data:g,nome,cId:assOrig[0]?.cId||'',ivId:assOrig[0]?.ivId||'',oraI:assOrig[0]?.oraI||'08:00',oraF:assOrig[0]?.oraF||'18:00',hasAss:assOrig.length>0,changeKey});
      const clickFn=bm?`apriBm(${idx})`:'';
      // Bordo arancio se cella modificata
      const modBorder=change?'outline:2px solid var(--gold);outline-offset:-2px;':'';
      const style=`padding:${assOrig.length?3:4}px;border-bottom:1px solid var(--brd);${assOrig.length?'vertical-align:top;':'text-align:center;'}background:${bg};${bm?'cursor:pointer;':''};${modBorder}`;
      h+=`<td style="${style}" onclick="${clickFn}">`;

      if(change){
        // Cella modificata: mostra stato nuovo
        if(change.tipo==='rimuovi'){
          h+=`<div style="text-align:center">
            <div style="color:var(--red);font-size:11px;font-weight:700">✕ Rimosso</div>
            <div style="color:var(--text2);font-size:10px;text-decoration:line-through">${assOrig[0]?.cNome||''}</div>
          </div>`;
        } else {
          const c=clr(change.after.cId);
          h+=`<div style="background:${c}25;border:1.5px solid ${c};border-radius:4px;padding:2px 5px;margin-bottom:2px;font-size:12px;font-weight:600;color:${c};white-space:nowrap">
            ${change.after.cNome.slice(0,8)}<br>${change.after.oraI}–${change.after.oraF}
            <div style="font-size:10px;color:var(--gold);margin-top:1px">✏️ modificato</div>
          </div>`;
        }
      } else if(!assOrig.length){
        h+=`<span style="color:${bm?'var(--gold)':'var(--text2)'};font-size:${bm?12:10}px">${bm?'＋':'—'}</span>`;
      } else {
        const confl=haConfl(assOrig);
        h+=assOrig.map(a=>{const c=clr(a.cId);return`<div style="background:${c}20;border:1px solid ${confl?'#ef4444':c};border-radius:4px;padding:2px 5px;margin-bottom:2px;font-size:12px;font-weight:600;color:${c};white-space:nowrap">${a.cNome.slice(0,8)}<br>${a.oraI}–${a.oraF}</div>`;}).join('');
        if(confl)h+=`<div style="font-size:12px;color:#ef4444;font-weight:700">⚠</div>`;
      }
      h+=`</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>
  <div style="font-size:12px;color:var(--text2);margin-top:8px">
    ${bm
      ? `🟡 = cella modificata · tocca qualsiasi cella per cambiare`
      : `— = libero`}

}

function apriBm(idx){
  if(!window._batchMode) return;
  const cell=window._sqCells?.[idx];
  if(!cell){toast('Errore: cella non trovata');return;}

  // Recupera eventuale modifica già fatta su questa cella
  const existing=window._gridChanges?.[cell.changeKey];
  const oraI=existing?.after?.oraI||cell.oraI;
  const oraF=existing?.after?.oraF||cell.oraF;
  const cId=existing?.after?.cId||cell.cId;

  document.getElementById('bm-data').value=cell.data;
  document.getElementById('bm-nome').value=cell.nome;
  document.getElementById('bm-cid').value=cId;
  document.getElementById('bm-ivid').value=cell.ivId;
  document.getElementById('bm-oraI').value=oraI;
  document.getElementById('bm-oraF').value=oraF;
  document.getElementById('bm-note').value=existing?.note||'';
  document.getElementById('bm-title').textContent=`${cell.nome} · ${fgiorno(cell.data)} ${fdate(cell.data)}`;

  // Mostra stato attuale (prima)
  const beforeEl=document.getElementById('bm-before');
  if(cell.hasAss){
    beforeEl.innerHTML=`<b style="color:var(--text2)">Stato attuale:</b> ${cell.cId?(DB.cantieri||[]).find(c=>c.id===cell.cId)?.nome||'—':'—'} ${cell.oraI}–${cell.oraF}`;
    beforeEl.style.display='block';
  } else {
    beforeEl.innerHTML=`<b style="color:var(--text2)">Stato attuale:</b> Libero`;
    beforeEl.style.display='block';
  }

  const sel=document.getElementById('bm-cantiere');
  sel.innerHTML=(DB.cantieri||[]).map(c=>`<option value="${c.id}" data-nome="${c.nome}" ${c.id===cId?'selected':''}>${c.nome}</option>`).join('');
  document.getElementById('bm-rimuovi').style.display=cell.hasAss?'block':'none';
  document.getElementById('bm-overlay').style.display='flex';
}

function salvaModificaCella(tipo){
  const data=document.getElementById('bm-data').value;
  const nome=document.getElementById('bm-nome').value;
  const ivId=document.getElementById('bm-ivid').value;
  const note=document.getElementById('bm-note').value;

  if(!window._gridChanges) window._gridChanges={};
  const changeKey=`${data}::${nome}`;

  // Trova il cell originale per lo "before"
  const cell=window._sqCells?.find(c=>c.changeKey===changeKey);

  if(tipo==='rimuovi'){
    window._gridChanges[changeKey]={
      tipo:'rimuovi', data, nome, ivId,
      before:cell?{cId:cell.cId,cNome:(DB.cantieri||[]).find(c=>c.id===cell.cId)?.nome||'',oraI:cell.oraI,oraF:cell.oraF}:null,
      after:null, note
    };
  } else {
    const sel=document.getElementById('bm-cantiere');
    const cId=sel.value;
    const cNome=sel.options[sel.selectedIndex]?.dataset.nome||sel.options[sel.selectedIndex]?.text||'';
    const oraI=document.getElementById('bm-oraI').value;
    const oraF=document.getElementById('bm-oraF').value;
    if(!cId){toast('Seleziona un cantiere');return;}
    window._gridChanges[changeKey]={
      tipo:'modifica', data, nome, ivId,
      before:cell?{cId:cell.cId,cNome:(DB.cantieri||[]).find(c=>c.id===cell.cId)?.nome||'',oraI:cell.oraI,oraF:cell.oraF}:null,
      after:{cId,cNome,oraI,oraF}, note
    };
  }

  // Aggiorna FAB
  const n=Object.keys(window._gridChanges).length;
  const fab=document.getElementById('batch-fab');
  const cnt=document.getElementById('batch-count');
  if(fab) fab.style.display=n>0?'block':'none';
  if(cnt) cnt.textContent=n;

  chiudiBm();
  aggiornaVistaSq(); // ridisegna la griglia con le modifiche visibili
}

function annullaModificaCella(changeKey){
  if(window._gridChanges) delete window._gridChanges[changeKey];
  const n=Object.keys(window._gridChanges||{}).length;
  const fab=document.getElementById('batch-fab');
  const cnt=document.getElementById('batch-count');
  if(fab) fab.style.display=n>0?'block':'none';
  if(cnt) cnt.textContent=n;
  document.getElementById('batch-recap-overlay').style.display='none';
  aggiornaVistaSq();
  if(n>0) mostraRiepilogoModifiche();
}

function chiudiBm(){
  document.getElementById('bm-overlay').style.display='none';
}

function toggleBatchMode(){
  window._batchMode=!window._batchMode;
  if(window._batchMode){
    window._gridChanges={};
    const fab=document.getElementById('batch-fab');
    if(fab){fab.style.display='none';}
    const cnt=document.getElementById('batch-count');
    if(cnt) cnt.textContent='0';
  } else {
    // Uscita da modalità modifica — chiedi se buttare le modifiche non inviate
    const n=Object.keys(window._gridChanges||{}).length;
    if(n>0 && !confirm(`Hai ${n} modifica${n!==1?'he':''} non inviate. Abbandonare?`)){
      window._batchMode=true; return;
    }
    window._gridChanges={};
    document.getElementById('batch-fab').style.display='none';
  }
  const btn=document.getElementById('batch-toggle');
  if(btn){
    btn.style.background=window._batchMode?'rgba(232,184,75,.15)':'rgba(232,184,75,.06)';
    btn.style.borderColor=window._batchMode?'var(--gold)':'rgba(232,184,75,.4)';
    btn.style.borderStyle=window._batchMode?'solid':'dashed';
    btn.textContent=window._batchMode?'✕ Esci da modalità modifica':'✏️ Modifica griglia — tocca per attivare';
  }
  aggiornaVistaSq();
}

function mostraRiepilogoModifiche(){
  const changes=window._gridChanges||{};
  const list=document.getElementById('batch-recap-list');
  if(!list) return;
  const entries=Object.entries(changes);
  if(!entries.length){toast('Nessuna modifica da proporre');return;}

  list.innerHTML=entries.map(([key,ch])=>{
    const icon=ch.tipo==='rimuovi'?'✕':'✏️';
    const colore=ch.tipo==='rimuovi'?'var(--red)':'var(--gold)';
    const beforeTxt=ch.before?.cId?(ch.before.cNome+' '+ch.before.oraI+'–'+ch.before.oraF):'Libero';
    const afterTxt=ch.tipo==='rimuovi'?'Rimosso':(ch.after.cNome+' '+ch.after.oraI+'–'+ch.after.oraF);
    return `<div style="border:1px solid var(--brd);border-radius:10px;padding:12px;margin-bottom:8px">

        <div>
          <div style="font-weight:700;font-size:13px">${ch.nome}</div>
          <div style="font-size:12px;color:var(--text2)">${fgiorno(ch.data)} ${fdate(ch.data)}</div>

        <div style="background:rgba(232,84,84,.08);border-radius:6px;padding:8px;font-size:11px">

          <div style="font-weight:600">${beforeTxt}</div>
        </div>
        <div style="background:rgba(0,180,166,.08);border-radius:6px;padding:8px;font-size:11px">
          <div style="color:var(--teal);margin-bottom:3px">Dopo</div>
          <div style="font-weight:700;color:${colore}">${afterTxt}</div>
        </div>
      </div>
      ${ch.note?`<div style="font-size:11px;color:var(--text2);margin-top:6px;font-style:italic">"${ch.note}"</div>`:''}
    </div>`;

  document.getElementById('batch-recap-overlay').style.display='flex';

async function inviaBatch(){
  const changes=window._gridChanges||{};
  const entries=Object.entries(changes);
  if(!entries.length){toast('Nessuna modifica da inviare');return;}
  document.getElementById('batch-recap-overlay').style.display='none';
  try{
    const d=await sbRead(STG_ID);
    const staging=d||{};
    if(!staging.changeRequests) staging.changeRequests=[];

    const proposte=entries.map(([key,ch])=>({
      tipo:ch.tipo==='rimuovi'?'RIMUOVI':'MODIFICA_TURNO',
      data:ch.data, nomeDip:ch.nome,
      cantiereId:ch.after?.cId||ch.before?.cId||'',
      cantiereName:ch.after?.cNome||ch.before?.cNome||'',
      oraInizio:ch.after?.oraI||'', oraFine:ch.after?.oraF||'',
      intervId:ch.ivId||null, note:ch.note||'',
      before:ch.before
    }));

    const cantieriCoinvolti=[...new Set(proposte.map(p=>p.cantiereName).filter(Boolean))].join(', ');

    staging.changeRequests.push({
      id:uid(), tipo:'TURNI_BATCH',
      propostoDa:DB._mioNome||'Roberto',
      autore:DB._mioNome||'Roberto',
      timestamp:new Date().toISOString(),
      stato:'pending', n:proposte.length,
      cantiereName:cantieriCoinvolti,
      proposte
    });

    await sbUpsert(STG_ID, staging);

    const n=proposte.length;
    window._gridChanges={};
    window._batchMode=false;
    document.getElementById('batch-fab').style.display='none';
    const btn=document.getElementById('batch-toggle');
    if(btn){
      btn.style.background='rgba(232,184,75,.06)';
      btn.style.borderStyle='dashed';
      btn.style.borderColor='rgba(232,184,75,.4)';
      btn.textContent='✏️ Modifica griglia — tocca per attivare';
    }
    aggiornaVistaSq();
    toast(`✓ ${n} modifica${n!==1?'he':''} inviate a Giuseppe per approvazione`);
  }catch(e){ toast('Errore invio: '+e.message); }
}

function selezionaTuttoWa(){

  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

function esportaWhatsApp(data){
  if(!data){ toast('Seleziona una data'); return; }
  const GG=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const MESI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const dt=new Date(data+'T12:00:00');
  const nomeGiorno=GG[dt.getDay()];
  const dataFormattata=`${dt.getDate()} ${MESI[dt.getMonth()]} ${dt.getFullYear()}`;

  const byC={};
  (DB.cantieri||[]).forEach(c=>{
    (c.interventi||[]).forEach(iv=>{
      const nott=iv.notturno||(toMin(iv.oraFine||'18:00')<=toMin(iv.oraInizio||'08:00'));
      const ieri=new Date(data+'T12:00:00'); ieri.setDate(ieri.getDate()-1);
      const ieriStr=ieri.toISOString().slice(0,10);
      if(iv.data!==data&&!(nott&&iv.data===ieriStr)) return;
      if(!byC[c.id]) byC[c.id]={nome:c.nome,interventi:[]};
      byC[c.id].interventi.push(iv);
    });
  });

  let testo=`📋 *PROGRAMMA LAVORO*\n`;
  testo+=`📅 *${nomeGiorno} ${dataFormattata}*\n`;
  testo+=`━━━━━━━━━━━━━━━━\n`;

  const cantieri=Object.values(byC);
  if(!cantieri.length){
    testo+=`\n_Nessun intervento pianificato_\n`;
  } else {
    cantieri.forEach(({nome,interventi})=>{
      interventi.sort((a,b)=>toMin(a.oraInizio)-toMin(b.oraInizio));
      interventi.forEach(iv=>{
        const sq=sqArr(iv);
        testo+=`\n🏗 *${nome}*\n`;
        testo+=`⏰ ${iv.oraInizio||'08:00'} → ${iv.oraFine||'18:00'}${iv.notturno?' 🌙':''}\n`;
        if(iv.descrizione) testo+=`📝 ${iv.descrizione}\n`;
        if(sq.length) testo+=`👷 ${sq.join(', ')}\n`;
      });
    });
  }

  testo+=`\n━━━━━━━━━━━━━━━━\n_Ottantunocento S.n.c._`;

  document.getElementById('wa-preview').textContent=testo;
  document.getElementById('wa-section').style.display='block';

  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(testo)
      .then(()=>toast('📋 Copiato! Incolla su WhatsApp'))
      .catch(()=>{ selezionaTuttoWa(); toast('Testo selezionato — copia manualmente'); });
  } else {
    selezionaTuttoWa();
    toast('Testo selezionato — copia manualmente');
  }
}

        <div>
          <div style='font-size:13px;font-weight:600'>${fdateG(iv.data)}${iv.notturno?' 🌙':''}</div>
          <div style='font-size:12px;color:var(--text2)'>${sqArr(iv).join(', ')||'—'}</div>
        </div>
        <div style='color:var(--teal);font-size:12px;white-space:nowrap;margin-left:8px;font-weight:700'>${iv.oraInizio||'08:00'}–${iv.oraFine||'18:00'}</div>
      </div>`).join('');
    }

    return `<div class='card'>
      <div style='display:flex;justify-content:space-between;align-items:flex-start'>
        <div style='flex:1;margin-right:8px'>
          <div style='font-size:16px;font-weight:800'>${c.nome}</div>
          ${c.committente?`<div style='font-size:12px;color:var(--text2);margin-top:2px'>${c.committente}${c.luogo?' · 📍'+c.luogo:''}</div>`:''}
          <div style='font-size:12px;color:var(--text2);margin-top:3px;font-family:monospace'>📅 ${fdate(c.periodoInizio)} → ${fdate(c.periodoFine||c.periodoInizio)}</div>
        </div>
        <span class='badge ${bcls}'>${c.stato||'da confermare'}</span>
      </div>
      ${proxHtml}
      ${dotHtml}
      ${c.note?`<div class='hr'></div><div style='font-size:12px;color:var(--text2);font-style:italic'>${c.note}</div>`:''}
    </div>`;
  }).join('');

  // Sezione depositi lungo periodo
  if(lp.length){
    const lpHtml=lp.map(c=>{
      const gg=c.dataRitiro?Math.ceil((new Date(c.dataRitiro+'T12:00:00')-new Date())/86400000):null;
      const prossivi=(c.interventi||[]).filter(iv=>iv.data>=t).slice(0,2);
      return `<div class='card' style='border-color:rgba(122,160,255,.3)'>
        <div style='display:flex;justify-content:space-between;align-items:flex-start'>
          <div>
            <div style='font-size:13px;font-weight:800'>${c.nome}</div>
            ${c.luogo?`<div style='font-size:12px;color:var(--text2)'>📍 ${c.luogo}</div>`:''}
          </div>
          <span class='badge' style='background:rgba(122,160,255,.15);color:#7aa0ff;border:1px solid rgba(122,160,255,.3)'>📦 Deposito</span>
        </div>
        ${c.dataRitiro?`<div style='margin-top:8px;font-size:12px;color:${gg<=7?'var(--gold)':'var(--text2)'};font-weight:${gg<=7?700:400}'>
          📅 Ritiro: ${fdate(c.dataRitiro)}${gg!==null?` (${gg===0?'OGGI':gg===1?'domani':'tra '+gg+' gg'})`:''}</div>`:''}
        ${prossivi.length?`<div style='margin-top:6px;font-size:12px;color:var(--teal);font-weight:700'>Prossimo: ${fdateG(prossivi[0].data)} ${prossivi[0].oraInizio||''}–${prossivi[0].oraFine||''}</div>`:''}
      </div>`;
    }).join('');
    el.innerHTML+= `<div style='font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#7aa0ff;margin:18px 0 8px'>📦 Depositi attrezzature (${lp.length})</div>${lpHtml}`;
  }
}

function toggleDot(id){
  const el=document.getElementById(id);
  if(el){ el.style.display=el.style.display==='none'?'block':'none'; }
}

// ── PROPONI ────────────────────────────────────────────────────
let PF={tipo:'INTERV_ADD',cId:'',sqTmp:[],ivVecchio:null};

function renderProponi(el){
  const opts=(DB.cantieri||[]).map(c=>`<option value="${c.id}">${c.nome}</option>`).join('');
  const pers=(DB.personaleHR||[]).map(p=>`<option value="${(p.nome||'')+' '+(p.cognome||'')}">`) .join('');
  el.innerHTML=`
    <datalist id="dl-p">${pers}</datalist>
    <div class="card">
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Le tue proposte vengono inviate al responsabile per revisione. Saranno visibili qui con lo stato di approvazione.</p>
      <div class="field"><label>Tipo proposta</label>
        <select id="pf-tipo" onchange="PF.tipo=this.value;PF.sqTmp=[];PF.ivVecchio=null;renderBody()">
          <option value="INTERV_ADD">➕ Nuova lavorazione / intervento</option>
          <option value="INTERV_MOD">✏️ Modifica squadra o orari</option>
          <option value="NOTA_OP">📝 Nota operativa</option>
        </select>
      </div>
      <div class="field"><label>Cantiere</label>
        <select id="pf-cant" onchange="PF.cId=this.value;renderBody()">
          <option value="">— Seleziona —</option>${opts}
        </select>
      </div>
      <div id="pf-body"></div>
      <button class="btn btn-p" onclick="inviaProposta()">📤 Invia al responsabile</button>
    </div>`;
  renderBody();

  // Se arrivo da Squadre con pre-compilazione, applico automaticamente
  if(window._sqPrecompila){
    const {data, nomeDip}=window._sqPrecompila;
    window._sqPrecompila=null;
    setTimeout(()=>{
      const dataEl=document.getElementById('pf-data');
      if(dataEl) dataEl.value=data;
      if(nomeDip && !PF.sqTmp.includes(nomeDip)){
        PF.sqTmp.push(nomeDip);
        renderTags();
      }
    },50);
  }
}

function renderBody(){
  const b=document.getElementById('pf-body'); if(!b) return;
  const cant=(DB.cantieri||[]).find(c=>c.id===PF.cId);
  if(PF.tipo==='INTERV_ADD'){
    b.innerHTML=`
      <div class="field"><label>Data</label><input type="date" id="pf-data" value="${today()}"></div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1"><label>Inizio</label><input type="time" id="pf-oi" value="08:00"></div>
        <div class="field" style="flex:1"><label>Fine</label><input type="time" id="pf-of" value="18:00"></div>
      </div>
      <div class="field"><label>Descrizione</label><input id="pf-desc" placeholder="es. Montaggio palco"></div>
      <div class="field"><label>Squadra</label>
        <div id="pf-tags" style="display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin-bottom:8px"></div>
        <div style="display:flex;gap:8px">
          <input id="pf-sq-in" list="dl-p" placeholder="Nome dipendente" style="flex:1;margin-bottom:0" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag()}">
          <button onclick="addTag()" style="background:var(--teal);border:none;border-radius:8px;padding:10px 14px;color:#fff;font-weight:700;font-size:16px;cursor:pointer">+</button>
        </div>
      </div>
      <div class="field"><label>Note per il responsabile</label><textarea id="pf-note" placeholder="Informazioni aggiuntive..."></textarea></div>`;
    renderTags();
  } else if(PF.tipo==='INTERV_MOD'){
    const ivOpts=cant?(cant.interventi||[]).map(iv=>`<option value="${iv.id}">${fdateG(iv.data)} ${iv.oraInizio||''}–${iv.oraFine||''} — ${iv.descrizione||'intervento'}</option>`).join(''):'';
    b.innerHTML=`
      <div class="field"><label>Intervento da modificare</label>
        <select id="pf-iv" onchange="precompilaMod(this.value)">
          <option value="">— Seleziona —</option>${ivOpts}
        </select>
      </div>
      <div id="pf-mod" style="display:none">
        <div style="display:flex;gap:8px">
          <div class="field" style="flex:1"><label>Nuovo inizio</label><input type="time" id="pf-moi" value="08:00"></div>
          <div class="field" style="flex:1"><label>Nuova fine</label><input type="time" id="pf-mof" value="18:00"></div>
        </div>
        <div class="field"><label>Nuova squadra</label>
          <div id="pf-tags" style="display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin-bottom:8px"></div>
          <div style="display:flex;gap:8px">
            <input id="pf-sq-in" list="dl-p" placeholder="Nome" style="flex:1;margin-bottom:0" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag()}">
            <button onclick="addTag()" style="background:var(--teal);border:none;border-radius:8px;padding:10px 14px;color:#fff;font-weight:700;font-size:16px;cursor:pointer">+</button>
          </div>
        </div>
        <div class="field"><label>Motivo della modifica</label><textarea id="pf-mnote" placeholder="Spiega brevemente..."></textarea></div>
      </div>`;
  } else {
    b.innerHTML=`
      <div class="field"><label>Nota operativa</label><textarea id="pf-nota" placeholder="Descrivi la situazione..." style="min-height:120px"></textarea></div>
      <div class="field"><label>Urgenza</label>
        <select id="pf-urg">
          <option value="normale">🟢 Normale — per conoscenza</option>
          <option value="alta">🟡 Alta — richiede attenzione</option>
          <option value="urgente">🔴 Urgente — richiede risposta immediata</option>
        </select>
      </div>`;
  }
}

function precompilaMod(ivId){
  const cant=(DB.cantieri||[]).find(c=>c.id===PF.cId);
  const iv=(cant?.interventi||[]).find(x=>x.id===ivId);
  if(!iv) return;
  PF.ivVecchio=iv; PF.sqTmp=[...sqArr(iv)];
  document.getElementById('pf-mod').style.display='block';
  document.getElementById('pf-moi').value=iv.oraInizio||'08:00';
  document.getElementById('pf-mof').value=iv.oraFine||'18:00';
  renderTags();
}

function renderTags(){
  const el=document.getElementById('pf-tags'); if(!el) return;
  el.innerHTML=PF.sqTmp.map((n,i)=>`<span class="chip" style="cursor:pointer" onclick="rmTag(${i})">${n} ×</span>`).join('');
}
function addTag(){
  const v=(document.getElementById('pf-sq-in')?.value||'').trim();
  if(!v) return;
  if(!PF.sqTmp.includes(v)) PF.sqTmp.push(v);
  document.getElementById('pf-sq-in').value='';
  renderTags();
}
function rmTag(i){ PF.sqTmp.splice(i,1); renderTags(); }

async function inviaProposta(){
  const tipo=PF.tipo;
  const cant=(DB.cantieri||[]).find(c=>c.id===PF.cId);
  if(!cant){ toast('⚠ Seleziona un cantiere'); return; }

  const cr={id:uid(),tipo,autore:USERNAME,cantiereId:PF.cId,cantiereName:cant.nome,stato:'pending',timestamp:new Date().toISOString()};

  if(tipo==='INTERV_ADD'){
    const data=document.getElementById('pf-data')?.value;
    if(!data){ toast('⚠ Inserisci la data'); return; }
    const oi=document.getElementById('pf-oi')?.value||'08:00';
    const of=document.getElementById('pf-of')?.value||'18:00';
    const desc=document.getElementById('pf-desc')?.value||'';
    cr.payload={id:uid(),data,oraInizio:oi,oraFine:of,descrizione:desc,squadra:[...PF.sqTmp],notturno:toMin(of)<=toMin(oi)};
    cr.note=document.getElementById('pf-note')?.value||'';
    cr.label=`Nuova lavorazione: ${fdateG(data)} ${oi}–${of}${desc?' — '+desc:''}`;
  } else if(tipo==='INTERV_MOD'){
    if(!PF.ivVecchio){ toast('⚠ Seleziona l\'intervento'); return; }
    const oi=document.getElementById('pf-moi')?.value||'08:00';
    const of=document.getElementById('pf-mof')?.value||'18:00';
    cr.intervId=PF.ivVecchio.id;
    cr.vecchio={...PF.ivVecchio};
    cr.payload={...PF.ivVecchio,oraInizio:oi,oraFine:of,squadra:[...PF.sqTmp],notturno:toMin(of)<=toMin(oi)};
    cr.note=document.getElementById('pf-mnote')?.value||'';
    cr.label=`Modifica intervento: ${fdateG(PF.ivVecchio.data)} su ${cant.nome}`;
  } else {
    const testo=(document.getElementById('pf-nota')?.value||'').trim();
    if(!testo){ toast('⚠ Scrivi la nota prima di inviare'); return; }
    const urg=document.getElementById('pf-urg')?.value||'normale';
    cr.payload={testo,urgenza:urg};
    cr.label=`Nota ${urg}: ${testo.slice(0,50)}${testo.length>50?'…':''}`;
  }

  try{
    STAGING.changeRequests.push(cr);
    await saveStaging();
    aggBadge();
    PF={tipo:'INTERV_ADD',cId:'',sqTmp:[],ivVecchio:null};
    toast('✓ Proposta inviata al responsabile');
    navigate('proposte');
  }catch(e){
    STAGING.changeRequests.pop(); // rollback ottimistico
    toast('⚠ Errore invio: '+e.message);
  }
}

// ── LE MIE PROPOSTE ────────────────────────────────────────────
function renderProposte(el){
  const crs=[...(STAGING.changeRequests||[])].reverse();
  if(!crs.length){ el.innerHTML=`<div class="empty">📋<br><br>Nessuna proposta inviata</div>`; return; }
  const SL={pending:'⏳ In attesa',approved:'✓ Approvata',rejected:'✗ Rifiutata'};
  const SC={pending:'b-gold',approved:'b-green',rejected:'b-red'};
  const PC={pending:'pending',approved:'approved',rejected:'rejected'};
  el.innerHTML=crs.map(cr=>`
    <div class="pr-card ${PC[cr.stato]||''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="font-size:13px;font-weight:700;flex:1">${cr.label||cr.tipo}</div>
        <span class="badge ${SC[cr.stato]||'b-gray'}" style="font-size:12px">${SL[cr.stato]||cr.stato}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:4px">
        🏗 ${cr.cantiereName} · ${new Date(cr.timestamp).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
      </div>
      ${cr.note?`<div style="font-size:12px;color:var(--text2);margin-top:6px;font-style:italic">"${cr.note}"</div>`:''}
      ${cr.stato==='rejected'&&cr.motivoRifiuto?`<div style="font-size:12px;color:var(--red);margin-top:6px;font-weight:600">Motivo: ${cr.motivoRifiuto}</div>`:''}
      ${cr.stato==='pending'?`<button onclick="annullaProposta('${cr.id}')" style="background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;margin-top:8px">Annulla ×</button>`:''}
    </div>`).join('');
}

async function annullaProposta(id){
  if(!confirm('Annullare questa proposta?')) return;
  const idx=STAGING.changeRequests.findIndex(r=>r.id===id);
  if(idx<0) return;
  STAGING.changeRequests.splice(idx,1);
  try{
    await saveStaging();
    aggBadge();
    renderProposte(document.getElementById('content'));
    toast('Proposta annullata');
  }catch(e){
    STAGING.changeRequests.splice(idx,0,STAGING.changeRequests[idx]); // rollback
    toast('⚠ Errore: '+e.message);
  }
}

// ── REFRESH ────────────────────────────────────────────────────
async function refreshData(){
  try{
    toast('⏳ Aggiornamento...',1500);
    await Promise.all([loadMain(),loadStaging()]);
    aggBadge();
    navigate(PAGE);
    toast('✓ Aggiornato');
  }catch(e){ toast('⚠ Errore di rete'); }
}

// ── AVVIO ──────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
